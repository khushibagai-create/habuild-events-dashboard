<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habuild App · Analytics Events</title>
<style>
:root{
  --green:#1f7a4d;--green-600:#15633d;--green-050:#eef6f1;
  --ink:#18211d;--muted:#6a776f;--faint:#9aa69e;
  --line:#e5ece7;--line-strong:#d3ddd6;--bg:#f5f8f6;--card:#fff;
  --blue:#2563a8;--blue-050:#eaf1fa;--violet:#7a3aa0;--violet-050:#f4ebfb;
  --red:#c0362c;--red-050:#fcecea;--red-line:#f2cdc8;
  --amber:#a5691a;--amber-050:#fbf1e0;--amber-line:#eeddba;
  --chip:#eef3ef;
  --topbar-h:56px;--toolbar-h:60px;--cardhead-h:46px;
  --shadow:0 1px 2px rgba(24,45,33,.05),0 2px 8px rgba(24,45,33,.05);
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}

/* Top bar */
.topbar{height:var(--topbar-h);display:flex;align-items:center;gap:14px;padding:0 22px;background:var(--green);color:#fff;position:sticky;top:0;z-index:50;}
.topbar .brand{font-weight:700;font-size:15px;letter-spacing:-.2px;display:flex;align-items:center;gap:9px;}
.topbar .brand .dot{width:9px;height:9px;border-radius:50%;background:#bff0d3;}
.topbar .meta{margin-left:auto;font-size:12px;opacity:.82;display:flex;gap:16px;align-items:center;}
.topbar .meta b{opacity:1;}
.topbar .sot{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:3px 11px;font-size:11.5px;font-weight:600;}

/* App shell */
.app{display:flex;height:calc(100vh - var(--topbar-h));}
.sidebar{width:264px;flex:none;background:var(--card);border-right:1px solid var(--line);overflow-y:auto;padding:14px 12px 30px;}
.content{flex:1;min-width:0;overflow-y:auto;position:relative;}

/* Sidebar nav */
.side-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;margin:14px 10px 7px;}
.navitem{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;cursor:pointer;font-size:13.5px;margin-bottom:2px;color:var(--ink);position:relative;}
.navitem:hover{background:var(--green-050);}
.navitem.active{background:var(--green);color:#fff;}
.navitem .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.navitem .ct{font-size:11px;font-weight:600;color:var(--muted);background:var(--chip);border-radius:999px;padding:1px 8px;}
.navitem.active .ct{background:rgba(255,255,255,.22);color:#fff;}
.navitem .warn{width:7px;height:7px;border-radius:50%;background:var(--amber);flex:none;}
.navitem.overview{font-weight:600;}

/* Content toolbar (sticky) */
.toolbar{height:var(--toolbar-h);display:flex;align-items:center;gap:12px;padding:0 24px;background:rgba(245,248,246,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30;}
.search{flex:1;max-width:520px;position:relative;}
.search input{width:100%;padding:10px 13px 10px 36px;font-size:14px;border:1px solid var(--line-strong);border-radius:10px;outline:none;background:#fff;}
.search input:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-050);}
.search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px;}
.filters{display:flex;gap:6px;}
.chip{font-size:12.5px;border:1px solid var(--line-strong);background:#fff;border-radius:999px;padding:5px 12px;cursor:pointer;color:var(--muted);white-space:nowrap;}
.chip:hover{border-color:var(--green);color:var(--green-600);}
.chip.on{background:var(--green);border-color:var(--green);color:#fff;}

/* Content body padding */
#view{padding:22px 24px 60px;}

/* Overview */
.pagehead{margin:2px 0 18px;}
.pagehead h1{margin:0;font-size:22px;letter-spacing:-.4px;}
.pagehead p{margin:5px 0 0;color:var(--muted);font-size:13px;max-width:720px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);}
.kpi .n{font-size:26px;font-weight:700;letter-spacing:-.5px;}
.kpi .l{font-size:12px;color:var(--muted);margin-top:2px;}
.kpi.alert .n{color:var(--red);}
.kpi .sub{font-size:11.5px;color:var(--faint);margin-top:4px;}

.section-t{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700;margin:22px 2px 10px;}

/* Data health card */
.health{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--red);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:6px;}
.health h3{margin:0 0 3px;font-size:15px;color:var(--red);}
.health .lede{font-size:12.5px;color:var(--muted);margin:0 0 12px;}
.health .grp{margin-top:14px;}
.health .grp > .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;margin-bottom:6px;}
.issue{display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--line);align-items:flex-start;}
.issue .sev{font-weight:700;font-size:10px;border-radius:5px;padding:2px 6px;flex:none;margin-top:1px;}
.issue .sev.P0{background:var(--red-050);color:var(--red);}
.issue .sev.P1{background:var(--amber-050);color:var(--amber);}
.issue .sev.BUG{background:#eef0f2;color:#5e6b63;}
.issue .sev.OK{background:#e3f3ea;color:var(--green-600);}
.issue .sev.NEXT{background:var(--blue-050);color:var(--blue);}
.health.ok{border-left-color:var(--green);}
.health.ok h3{color:var(--green-600);}
.issue .txt{font-size:13px;}
.issue .txt b{color:var(--ink);}
.issue .txt .d{color:var(--muted);}
.health code{background:var(--chip);border-radius:4px;padding:1px 5px;font-size:12px;}
.health .foot{margin-top:14px;font-size:12px;color:var(--muted);}

/* Feature cards grid */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
.fcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .08s,border-color .08s;}
.fcard:hover{border-color:var(--green);transform:translateY(-1px);}
.fcard .fn{font-weight:700;font-size:14.5px;margin-bottom:9px;}
.fcard .row{display:flex;gap:14px;font-size:12px;color:var(--muted);}
.fcard .row .v{font-weight:700;color:var(--ink);font-size:15px;display:block;}
.fcard .flags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;min-height:1px;}

/* Feature flow view */
.crumbs{font-size:12.5px;color:var(--muted);margin-bottom:6px;}
.crumbs a{color:var(--muted);}
.flowhead{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.flowhead h1{margin:0;font-size:20px;letter-spacing:-.3px;}
.flowhead .stat{font-size:12.5px;color:var(--muted);}
.flowhead .acts{margin-left:auto;display:flex;gap:8px;}
.btn{font-size:12.5px;border:1px solid var(--line-strong);background:#fff;border-radius:9px;padding:7px 12px;cursor:pointer;color:var(--ink);}
.btn:hover{background:var(--green-050);border-color:var(--green);}
.legend{font-size:11.5px;color:var(--muted);margin:0 0 14px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.railwrap{display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;margin-bottom:6px;}
.rc{flex:none;font-size:12px;font-family:ui-monospace,Menlo,monospace;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:5px 11px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.rc:hover{background:var(--green-050);border-color:var(--green);}
.rc .rd{width:6px;height:6px;border-radius:50%;background:var(--amber);}

/* Screen cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow);scroll-margin-top:calc(var(--toolbar-h) + 12px);}
.card-head{height:var(--cardhead-h);display:flex;align-items:center;gap:10px;padding:0 15px;background:var(--green-050);border-bottom:1px solid var(--line);border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;position:sticky;top:var(--toolbar-h);z-index:6;}
.card.collapsed .card-head{border-radius:var(--radius);border-bottom:none;}
.card-head .caret{color:var(--muted);font-size:12px;transition:transform .15s;}
.card.collapsed .caret{transform:rotate(-90deg);}
.card.collapsed .tablewrap{display:none;}
.card-head .nm{font-weight:700;font-size:14px;color:var(--green-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-head .raw{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--faint);white-space:nowrap;}
.card-head .strip{margin-left:auto;display:flex;gap:6px;align-items:center;flex:none;}
.pill{border-radius:999px;font-size:11px;padding:2px 9px;font-weight:600;background:#fff;border:1px solid var(--line-strong);color:var(--muted);white-space:nowrap;}
.pill.v{color:var(--green-600);border-color:#bfe0cd;}
.pill.c{color:var(--blue);border-color:#bcd4ee;}
.gap{border-radius:999px;font-size:10.5px;padding:2px 8px;font-weight:700;white-space:nowrap;}
.gap.amber{background:var(--amber-050);color:var(--amber);border:1px solid var(--amber-line);}
.gap.grey{background:#eef0f2;color:#5e6b63;border:1px solid #dfe3e6;}

.tablewrap{overflow:hidden;border-radius:0 0 var(--radius) var(--radius);}
table{border-collapse:collapse;width:100%;font-size:13px;}
thead th{background:#fbfdfc;color:var(--muted);text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding:8px 15px;border-bottom:1px solid var(--line);white-space:nowrap;}
td{border-top:1px solid var(--line);padding:9px 15px;vertical-align:top;}
tbody tr:first-child td{border-top:none;}
tr.viewrow td{background:#f4faf6;}
tr:hover td{background:#fafcfb;}
.mono{font-family:ui-monospace,Menlo,monospace;font-size:12px;overflow-wrap:anywhere;}

.evname{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;white-space:nowrap;}
.evname::before{content:"";display:inline-block;flex:none;width:7px;height:7px;border-radius:2px;margin-right:7px;background:var(--faint);}
.evname.view{color:var(--green-600);}
.evname.view::before{background:var(--green);}
.evname.click{color:var(--blue);}
.evname.click::before{background:var(--blue);}
.evname.other{color:var(--violet);}
.evname.other::before{background:var(--violet);}
.evname:hover{text-decoration:underline;}
.mini{font-size:9.5px;font-weight:700;border-radius:5px;padding:1px 5px;margin-left:2px;vertical-align:middle;white-space:nowrap;}
.mini.custom{background:var(--violet-050);color:var(--violet);}
.mini.reuse{background:var(--amber-050);color:var(--amber);border:1px solid var(--amber-line);}
.mini.qa{border:1px solid;cursor:help;}
.mini.qa.P0{background:var(--red-050);color:var(--red);border-color:var(--red-line);}
.mini.qa.P1{background:var(--amber-050);color:var(--amber);border-color:var(--amber-line);}
.sevb{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.3px;border-radius:5px;padding:2px 8px;border:1px solid;white-space:nowrap;}
.sevb.P0{background:var(--red-050);color:var(--red);border-color:var(--red-line);}
.sevb.P1{background:var(--amber-050);color:var(--amber);border-color:var(--amber-line);}
.sevb.GAP{background:var(--amber-050);color:var(--amber);border-color:var(--amber-line);font-weight:700;}
.okpill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.3px;border-radius:5px;padding:2px 8px;border:1px solid #bfe0cd;background:#eef8f1;color:var(--green-600);}
.devmeta{font-size:12px;color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0;margin-left:8px;}
.devmeta .st{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;border-radius:5px;padding:1px 7px;background:var(--blue-050);color:var(--blue);margin-right:8px;}
.rules{max-width:900px;}
.rule{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);}
.rule h3{margin:0 0 6px;font-size:14.5px;color:var(--ink);}
.rule p{margin:0 0 10px;font-size:13px;color:var(--muted);line-height:1.55;}
.rule .ex{display:flex;gap:10px;flex-wrap:wrap;}
.rule .ex .box{flex:1 1 260px;border-radius:8px;padding:9px 11px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.5;}
.rule .ex .do{background:#eef8f1;border:1px solid #bfe0cd;color:#1c5c37;}
.rule .ex .dont{background:var(--red-050);border:1px solid var(--red-line);color:#8a2a2a;}
.rule .ex .lbl{display:block;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;opacity:.8;}
.rule code{background:#f0f3f1;border-radius:4px;padding:1px 5px;font-size:11.5px;}
.rule ul{margin:4px 0 0;padding-left:18px;font-size:13px;color:var(--muted);line-height:1.6;}
table td.chk{white-space:normal;}
.iss-ev{font-family:ui-monospace,Menlo,monospace;font-weight:600;font-size:12.5px;color:var(--ink);}
.iss-fix{color:var(--muted);font-size:12.5px;line-height:1.5;}
.iss-fix b{color:var(--ink);font-weight:600;}
.iss-where{color:var(--faint);font-size:11px;font-family:ui-monospace,Menlo,monospace;white-space:nowrap;}
.issbanner{display:flex;align-items:center;gap:12px;background:var(--amber-050);border:1px solid var(--amber-line);border-radius:var(--radius);padding:12px 16px;margin-bottom:6px;cursor:pointer;}
.issbanner:hover{background:#fdf3e2;}
.issbanner .ico{width:8px;height:8px;border-radius:2px;background:var(--amber);flex:none;}
.issbanner .t{font-size:13.5px;color:var(--ink);font-weight:600;}
.issbanner .go{margin-left:auto;font-size:12.5px;color:var(--amber);font-weight:600;}
.tag{display:inline-block;background:var(--blue-050);color:#2c4a6b;border-radius:6px;padding:1px 8px;margin:1px 3px 1px 0;font-size:11.5px;font-family:ui-monospace,Menlo,monospace;cursor:pointer;}
.tag:hover{background:#dbe6f8;}
.kv{display:inline-flex;align-items:baseline;gap:4px;background:var(--blue-050);border-radius:6px;padding:1px 8px;margin:1px 3px 1px 0;font-size:11.5px;font-family:ui-monospace,Menlo,monospace;cursor:pointer;max-width:100%;}
.kv:hover{background:#dbe6f8;}
.kv b{color:#2c4a6b;font-weight:600;}
.kv .v{color:#0a7d3c;}
.kv.dyn{background:#f4f1fa;}
.kv.dyn:hover{background:#e9e3f6;}
.kv.dyn .v{color:#7a5cc0;font-style:italic;}
.kv .eq{color:#9aa5b1;}
.nopay{color:var(--amber);font-size:11.5px;font-weight:600;}
.loc{color:var(--faint);font-size:11px;font-family:ui-monospace,Menlo,monospace;white-space:nowrap;width:1%;text-align:right;}
td.evcell{white-space:nowrap;width:1%;}
td.evcell .mini{margin-top:2px;}
.pmt{color:var(--faint);}
.empty{color:var(--muted);padding:50px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);}
.srchfeat{font-size:12px;font-weight:700;color:var(--green-600);text-transform:uppercase;letter-spacing:.4px;margin:20px 0 8px;cursor:pointer;}
.srchfeat:hover{text-decoration:underline;}
mark{background:#fdf0c8;padding:0 1px;border-radius:2px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:80;}
.toast.show{opacity:1;}
details.more{margin-top:10px;}
details.more summary{cursor:pointer;font-size:12.5px;color:var(--blue);font-weight:600;}

/* ---------- flow grouping ---------- */
function rowsFlow(){
  const rows=DATA.filter(r=>r.feature===current);
  const byScreen={};
  rows.forEach(r=>{const k=r.screen||"__none";(byScreen[k]=byScreen[k]||[]).push(r);});
  const screens=Object.keys(byScreen).map(k=>{
    const rs=byScreen[k].slice().sort((a,b)=>a.line-b.line);
    const flowOrder=rs.find(r=>typeof r.flowOrder==="number");
    return {screen:k,rows:byScreen[k],minLine:rs[0].line,file:rs[0].file,flowOrder:flowOrder?flowOrder.flowOrder:null};
  });
  const fileMin={};
  screens.forEach(s=>{fileMin[s.file]=Math.min(fileMin[s.file]??1e9,s.minLine);});
  screens.forEach(s=>{s._sortFile=s.screen==="__none"?1e9:fileMin[s.file];});
  screens.sort((a,b)=>{
    if(a.flowOrder!=null||b.flowOrder!=null)return (a.flowOrder??1e9)-(b.flowOrder??1e9);
    return a._sortFile-b._sortFile || a.minLine-b.minLine;
  });
  return {order:screens};
}
function stats(rows){
  let v=0,c=0,o=0,nopay=false;
  rows.forEach(r=>{const f=fam(r.event);if(f==="view")v++;else if(f==="click")c++;else o++;if(!(r.keys&&r.keys.length))nopay=true;});
  const flags=[];
  if(c>0&&v===0)flags.push(["amber","no screen_viewed"]);
  if(v>0&&c===0&&o===0)flags.push(["grey","view only"]);
  return {v,c,o,nopay,flags};
}
function sortRows(rows){
  const rank={view:0,click:1,other:2};
  return rows.slice().sort((a,b)=>rank[fam(a.event)]-rank[fam(b.event)]||a.line-b.line);
}
function evChips(ev){
  // Issue/gap markers live only in the Issues view; event tables show events only.
  return "";
}
function parsePayload(p){
  if(!p)return [];
  let s=p.trim().replace(/^\{/,'').replace(/\}$/,'');
  const parts=[]; let depth=0,cur='',q=null;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(q){cur+=c; if(c===q&&s[i-1]!=='\\')q=null; continue;}
    if(c==='"'||c==="'"||c==='`'){q=c;cur+=c;continue;}
    if(c==='{'||c==='['||c==='(')depth++;
    if(c==='}'||c===']'||c===')')depth--;
    if(c===','&&depth===0){if(cur.trim())parts.push(cur.trim());cur='';continue;}
    cur+=c;
  }
  if(cur.trim())parts.push(cur.trim());
  return parts.map(seg=>{
    const ci=seg.indexOf(':');
    if(ci<0)return {k:seg.replace(/^['"]|['"]$/g,''),v:null,lit:false};
    const k=seg.slice(0,ci).trim().replace(/^['"]|['"]$/g,'');
    let v=seg.slice(ci+1).trim();
    const lit=/^['"`]/.test(v)||/^(true|false|null|-?\d+(\.\d+)?)$/.test(v);
    if(/^['"`]/.test(v))v=v.replace(/^['"`]|['"`]$/g,'');
    return {k,v,lit};
  });
}
function keyCell(r){
  const props=parsePayload(r.payload);
  if(!props.length)return '<span class="nopay" title="This call sends no event-specific payload">no payload</span>';
  return props.map(p=>{
    const copy=(p.v===null?p.k:p.k+': '+p.v).replace(/'/g,"\\'");
    if(p.v===null)return `<span class="tag" onclick="cp('${copy}','Copied')">${esc(p.k)}</span>`;
    if(p.lit)return `<span class="kv" title="literal value" onclick="cp('${copy}','Copied')"><b>${esc(p.k)}</b><span class="eq">=</span><span class="v">${esc(p.v)}</span></span>`;
    return `<span class="kv dyn" title="runtime value (resolved at send time)" onclick="cp('${copy}','Copied')"><b>${esc(p.k)}</b><span class="eq">=</span><span class="v">${esc(p.v)}</span></span>`;
  }).join("");
}

/* ---------- event rules (single source of truth for how we create events) ---------- */
const VOCAB=["screen_viewed","button_clicked","session_started","session_completed","level_unlocked","feature_event","error_occurred"];
function checkRules(e){
  const props=parsePayload(e.payload||"");
  const keys=props.map(p=>p.k);
  const v=[];
  if(!VOCAB.includes(e.event))
    v.push('Non-standard event name. Use '+(/(click|tap|press|btn|button)/i.test(e.event)?'button_clicked':'feature_event')+' and put the specific name in a property.');
  if(!keys.includes("screen"))
    v.push('Missing screen property (every event needs a snake_case screen).');
  if(e.event==="button_clicked"&&!keys.includes("button"))
    v.push('button_clicked must include a button property.');
  if(e.event==="feature_event"&&!keys.includes("action"))
    v.push('feature_event must include an action property.');
  keys.forEach(k=>{if(!/^[a-z][a-z0-9_]*$/.test(k))v.push('Property "'+k+'" is not snake_case.');});
  props.forEach(p=>{if(p.lit&&typeof p.v==="string"&&/[A-Z]/.test(p.v)&&/^[a-z0-9_ ]*$/i.test(p.v)&&/ /.test(p.v))v.push('Value of "'+p.k+'" looks like display copy. Use a stable snake_case value.');});
  return v;
}
function renderRules(){
  let h='<div class="pagehead"><h1>Event rules</h1><p>How we name and structure every analytics event at Habuild. The <b>add-feature-events</b> skill generates events to these rules, and the Features-in-dev review checks proposed events against them. This is the single source of truth. Keep the vocabulary narrow so dashboards and funnels stay clean.</p></div>';
  h+='<div class="rules">';

  h+=`<div class="rule"><h3>1. Use the standard event vocabulary only</h3>
    <p>Never invent a new top-level event name. Everything maps to one of these. The specific thing goes in a property, not the event name.</p>
    <ul>
      <li><code>screen_viewed</code> - a screen is shown</li>
      <li><code>button_clicked</code> - any tap or press on a control</li>
      <li><code>session_started</code> / <code>session_completed</code> - a core activity begins / finishes (yoga, physio, box breathing)</li>
      <li><code>level_unlocked</code> - a milestone or progression is reached</li>
      <li><code>feature_event</code> - anything else, with an <code>action</code> property naming the specific thing</li>
      <li><code>error_occurred</code> - a handled error or failed request</li>
    </ul>
    <div class="ex">
      <div class="box do"><span class="lbl">Do</span>trackEvent('feature_event', { screen: 'physio_home', action: 'reminder_set', pain_area: painArea })</div>
      <div class="box dont"><span class="lbl">Don't</span>trackEvent('reminder_set', { time })</div>
    </div></div>`;

  h+=`<div class="rule"><h3>2. Required properties on every event</h3>
    <p>These are non-negotiable so events can be grouped and funnelled.</p>
    <ul>
      <li>Every event: <code>screen</code> (snake_case name of the screen it fired on)</li>
      <li><code>button_clicked</code>: also <code>button</code> (snake_case id of the control)</li>
      <li><code>feature_event</code>: also <code>action</code> (snake_case verb_noun, e.g. <code>reminder_set</code>)</li>
      <li>Core activities: <code>session_type</code> and, for durations, <code>sec</code> (seconds, integer)</li>
    </ul>
    <div class="ex">
      <div class="box do"><span class="lbl">Do</span>trackEvent('button_clicked', { screen: 'sleep_home', button: 'play_story' })</div>
      <div class="box dont"><span class="lbl">Don't</span>trackEvent('button_clicked', { label: 'Play' })</div>
    </div></div>`;

  h+=`<div class="rule"><h3>3. snake_case keys, stable machine values</h3>
    <p>Property keys are <code>snake_case</code>. Values are stable machine strings, not user-facing copy or translated text. Cap free text. Durations in seconds as <code>sec</code>.</p>
    <div class="ex">
      <div class="box do"><span class="lbl">Do</span>{ screen: 'box_breathing_summary', button: 'share_summary', box_breathing_variant: 'four_four' }</div>
      <div class="box dont"><span class="lbl">Don't</span>{ Screen: 'Box Breathing', buttonLabel: 'Share your journey!' }</div>
    </div></div>`;

  h+=`<div class="rule"><h3>4. Identity and experiments are super properties</h3>
    <p>Do not re-send identity on each event. <code>name</code> and <code>phone_number</code> are set once as super properties. Experiment assignment rides along as <code>exp_&lt;key&gt;</code> super properties, so any event can be split by variation. Use <code>phone_number</code> (never <code>mobile_number</code> / <code>whatsapp_number</code>).</p></div>`;

  h+=`<div class="rule"><h3>5. One event per action, no PII in payload</h3>
    <p>Fire an event once per real user action; do not double-fire on re-render. Never put PII (email, address, raw phone) in an event payload. If a screen tracks taps, it must also fire <code>screen_viewed</code> on mount so arrival is measurable.</p></div>`;

  h+='</div>';
  return h;
}

/* ---------- features in dev (review queue) ---------- */
function renderDev(){
  let h='<div class="pagehead"><h1>Features in dev</h1><p>Events proposed by the team through the <b>add-feature-events</b> skill, before they ship to main. Each is auto-checked against the <a href="#" onclick="goRules();return false;">event rules</a>. Review here, then they graduate into the live dashboard once the feature merges.</p></div>';
  if(!DEV_DATA.length){
    h+='<div class="empty">Nothing in dev right now. When a dev runs the <b>add-feature-events</b> skill, their proposed events appear here for your review.</div>';
    return h;
  }
  DEV_DATA.forEach(f=>{
    const evs=f.events||[];
    let bad=0; evs.forEach(e=>{if(checkRules(e).length)bad++;});
    const meta=`<span class="devmeta"><span class="st">${esc(f.status||"in-dev")}</span>${[f.owner,f.submitted,f.branch].filter(Boolean).map(esc).join(" · ")}${bad?` · ${bad} of ${evs.length} need fixes`:` · all ${evs.length} pass`}</span>`;
    h+=`<div class="section-t">${esc(f.featureName||f.feature)}${meta}</div>`;
    h+='<div class="card"><div class="tablewrap"><table><thead><tr><th>Event</th><th>Screen</th><th>Payload</th><th>Rule check</th><th>Where</th></tr></thead><tbody>';
    evs.forEach(e=>{
      const vio=checkRules(e);
      const chk=vio.length
        ? `<span class="sevb P1">${vio.length} issue${vio.length>1?"s":""}</span> <span class="iss-fix">${vio.map(esc).join(" ")}</span>`
        : '<span class="okpill">passes rules</span>';
      h+=`<tr>
        <td class="evcell"><span class="evname ${fam(e.event)}">${esc(e.event)}</span></td>
        <td class="mono">${e.screen?esc(e.screen):'<span class="pmt">·</span>'}</td>
        <td>${keyCell(e)}</td>
        <td class="chk">${chk}</td>
        <td class="loc" title="${esc(e.file||"")}${e.line?":"+e.line:""}">${e.file?esc(e.file.split('/').pop()):"pending"}${e.line?":"+e.line:""}</td>
      </tr>`;
    });
    h+='</tbody></table></div></div>';
  });
  return h;
}

/* ---------- issues ---------- */
function issueList(){
  const events=[];
  Object.keys(QA).forEach(ev=>{
    const sites=DATA.filter(r=>r.event===ev);
    if(!sites.length)return;
    events.push({
      ev, sev:QA[ev].s, note:QA[ev].n,
      feats:[...new Set(sites.map(r=>r.featureName||r.feature))],
      n:sites.length
    });
  });
  events.sort((a,b)=>a.sev.localeCompare(b.sev)||a.ev.localeCompare(b.ev));
  const gaps=[];
  FEATS.forEach(f=>{
    const rows=DATA.filter(r=>r.feature===f.id);
    const byS={}; rows.forEach(r=>{const k=r.screen||"__none";(byS[k]=byS[k]||[]).push(r);});
    Object.keys(byS).forEach(k=>{if(k==="__none")return;
      stats(byS[k]).flags.forEach(g=>{if(g[1]==="no screen_viewed")gaps.push({screen:k,feat:f.name,fid:f.id});});
    });
  });
  gaps.sort((a,b)=>a.feat.localeCompare(b.feat)||a.screen.localeCompare(b.screen));
  return {events,gaps};
}
function renderIssues(){
  const {events,gaps}=issueList();
  let h='<div class="pagehead"><h1>Data issues</h1><p>Every event and screen flagged for a data-reliability or taxonomy problem, with the recommended fix. Hand these to the mobile team. <b>P0</b> blocks funnels and experiments; <b>P1</b> is cleanup that keeps the taxonomy tight.</p></div>';

  h+=`<div class="section-t">Event naming and taxonomy (${events.length})</div>`;
  if(events.length){
    h+='<div class="card"><div class="tablewrap"><table><thead><tr><th>Event</th><th>Severity</th><th>Problem and recommended fix</th><th>Where</th></tr></thead><tbody>';
    events.forEach(e=>{
      h+=`<tr>
        <td class="evcell"><span class="iss-ev" onclick="cp('${e.ev}','Copied: ${e.ev}')" style="cursor:pointer">${esc(e.ev)}</span></td>
        <td class="evcell"><span class="sevb ${e.sev}">${e.sev}</span></td>
        <td class="iss-fix">${esc(e.note)}</td>
        <td class="loc" title="${esc(e.feats.join(', '))}">${esc(e.feats.slice(0,2).join(', '))}${e.feats.length>2?` +${e.feats.length-2}`:''} · ${e.n} site${e.n>1?'s':''}</td>
      </tr>`;
    });
    h+='</tbody></table></div></div>';
  } else { h+='<div class="empty">No event-naming issues.</div>'; }

  h+=`<div class="section-t">Screen coverage gaps (${gaps.length})</div>`;
  if(gaps.length){
    h+='<div class="card"><div class="tablewrap"><table><thead><tr><th>Screen</th><th>Feature</th><th>Gap</th><th>Why it matters</th></tr></thead><tbody>';
    gaps.forEach(g=>{
      h+=`<tr>
        <td class="evcell"><span class="iss-ev" onclick="openScreen('${g.fid}','${esc(g.screen)}')" style="cursor:pointer" title="Open this screen">${esc(g.screen)}</span></td>
        <td class="mono">${esc(g.feat)}</td>
        <td class="evcell"><span class="sevb GAP">no screen_viewed</span></td>
        <td class="iss-fix">Taps are tracked on this screen but no <code>screen_viewed</code> fires, so you can measure interactions but not how many members reached it. Add a <code>screen_viewed</code> on mount.</td>
      </tr>`;
    });
    h+='</tbody></table></div></div>';
  } else { h+='<div class="empty">No screen coverage gaps.</div>'; }
  return h;
}

function render(){
  renderSide();
  const view=document.getElementById("view");
  if(query){view.innerHTML=renderSearch();return;}
  view.innerHTML = (mode==="overview") ? renderOverview() : (mode==="issues") ? renderIssues() : (mode==="dev") ? renderDev() : (mode==="rules") ? renderRules() : renderFeature();
}

function exportTracker(){
  const {order}=rowsFlow();
  const f=FEATS.find(x=>x.id===current)||{};
  let out=`# ${f.name}: events\n\n| Screen | Event | Trigger | Payload | Where |\n| --- | --- | --- | --- | --- |\n`;
  const pl=r=>parsePayload(r.payload).map(p=>p.v===null?p.k:`${p.k}=${p.v}`).join("; ");
  order.forEach(s=>{const nm=s.screen==="__none"?"(feature-level)":s.screen;sortRows(s.rows).forEach(r=>{out+=`| ${nm} | ${r.event} | ${r.trigger||""} | ${pl(r)} | ${r.file}${r.line?":"+r.line:""} |\n`;});});
  cp(out,"Tracker table copied ("+f.name+")");
}

document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim();render();});
render();

// Load proposed events submitted by the add-feature-events skill. Works on the
// published (GitHub Pages) URL; on a local file:// open the fetch is blocked and
// Features-in-dev simply shows empty until you view the published dashboard.
fetch("dev-events.json",{cache:"no-store"})
  .then(r=>r.ok?r.json():[])
  .then(d=>{if(Array.isArray(d)){DEV_DATA=d;renderSide();if(mode==="dev")render();}})
  .catch(()=>{});
</script>
